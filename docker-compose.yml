name: discord-penguin-bot

services:
  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:-}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:-}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID:-}
      LAVALINK_HOST: ${LAVALINK_HOST:-lavalink}
      LAVALINK_PORT: ${LAVALINK_PORT:-2333}
      LAVALINK_PASSWORD: ${LAVALINK_PASSWORD:-}
      LAVALINK_SECURE: ${LAVALINK_SECURE:-false}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      DASHBOARD_SECRET: ${DASHBOARD_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/db/discord_penguin.db}
      MUSIC_STATUS_SNAPSHOT_PATH: /runtime/music-status/status.json
    volumes:
      - ./tmp/music-status:/runtime/music-status
    depends_on:
      lavalink:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # The API is a read-only snapshot consumer: it is intentionally NOT given any
    # LAVALINK_* credentials and never connects to Lavalink directly.
    environment:
      DASHBOARD_SECRET: ${DASHBOARD_SECRET:-}
      DATABASE_URL: ${DATABASE_URL:-sqlite:///data/db/discord_penguin.db}
      MUSIC_STATUS_SNAPSHOT_PATH: /runtime/music-status/status.json
      MUSIC_STATUS_STALE_AFTER_MS: ${MUSIC_STATUS_STALE_AFTER_MS:-15000}
    volumes:
      - ./tmp/music-status:/runtime/music-status:ro
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - api
    restart: unless-stopped

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    environment:
      SERVER_PORT: 2333
      LAVALINK_SERVER_PASSWORD: ${LAVALINK_PASSWORD:-}
    volumes:
      - ./services/lavalink/application.yml:/opt/Lavalink/application.yml:ro
    ports:
      - "127.0.0.1:2333:2333"
    healthcheck:
      test:
        ["CMD-SHELL", "wget -q -O /dev/null --header \"Authorization: $$LAVALINK_SERVER_PASSWORD\" http://127.0.0.1:2333/version"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
