# Phase 2B — Dashboard nginx config.
# Serves the static SPA and reverse-proxies /api/ to the API service so the
# browser talks to a single origin (no CORS, no build-time API URL needed).
server {
    listen       80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # Same-origin API proxy. MUST be declared before the SPA catch-all.
    # The trailing slash on proxy_pass strips the /api/ prefix, so
    # GET /api/music/status -> http://api:8000/music/status.
    location /api/ {
        proxy_pass         http://api:8000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
